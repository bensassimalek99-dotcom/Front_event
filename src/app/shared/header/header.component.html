<header class="ev-header">
  <div class="ev-header-inner">

    <!-- ── Logo ── -->
    <a routerLink="/" class="ev-logo" (click)="closeMenu()">
      <span class="logo-icon">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
          <path d="M10 2C5.58 2 2 5.58 2 10s3.58 8 8 8 8-3.58 8-8-3.58-8-8-8zm0 3a2 2 0 110 4 2 2 0 010-4zm0 9.2c-2.67 0-5.03-1.38-6.4-3.47.03-2.12 4.27-3.28 6.4-3.28 2.12 0 6.37 1.16 6.4 3.28-1.37 2.09-3.73 3.47-6.4 3.47z" fill="white"/>
        </svg>
      </span>
      <span class="logo-event">Event</span><span class="logo-ura">ura</span>
    </a>

    <!-- ── Desktop Nav ── -->
    <nav class="ev-nav" role="navigation" aria-label="Navigation principale">
      <a routerLink="/home" routerLinkActive="ev-nav-link--active"
         [routerLinkActiveOptions]="{exact:true}" class="ev-nav-link">Accueil</a>
      <a routerLink="/listing" routerLinkActive="ev-nav-link--active"
         class="ev-nav-link">Événements</a>
      <a routerLink="/contact-us" routerLinkActive="ev-nav-link--active"
         class="ev-nav-link">Contact</a>
    </nav>

    <!-- ── Desktop Auth Actions ── -->
    <div class="ev-auth-actions">
      <ng-container *ngIf="!authService.isAuthenticated()">
        <a routerLink="/login" class="ev-btn ev-btn-ghost" (click)="closeMenu()">Connexion</a>
        <a routerLink="/register" class="ev-btn ev-btn-primary" (click)="closeMenu()">S'inscrire</a>
      </ng-container>
      <ng-container *ngIf="authService.isAuthenticated()">
        <a routerLink="/listing" class="ev-btn ev-btn-ghost" (click)="closeMenu()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          Événements
        </a>
        <button class="ev-btn ev-btn-outline ev-logout-btn" (click)="logout()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
            <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
          Déconnexion
        </button>
      </ng-container>
    </div>

    <!-- ── Mobile Burger ── -->
    <button class="ev-burger" [class.is-open]="mobileMenuOpen"
            (click)="toggleMenu()" aria-label="Ouvrir le menu" type="button">
      <span></span><span></span><span></span>
    </button>

  </div>

  <!-- ── Mobile Menu Drawer ── -->
  <div class="ev-mobile-menu" [class.is-open]="mobileMenuOpen" role="dialog" aria-label="Menu mobile">
    <nav class="ev-mobile-nav">
      <a routerLink="/home" class="ev-mobile-link" (click)="closeMenu()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        Accueil
      </a>
      <a routerLink="/listing" class="ev-mobile-link" (click)="closeMenu()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        Événements
      </a>
      <a routerLink="/contact-us" class="ev-mobile-link" (click)="closeMenu()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.67A2 2 0 012 .18h3a2 2 0 012 1.72 12.84 12.84 0 00.7 2.81 2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45 12.84 12.84 0 002.81.7A2 2 0 0122 14h-.08z"/>
        </svg>
        Contact
      </a>
    </nav>

    <div class="ev-mobile-divider"></div>

    <div class="ev-mobile-auth">
      <ng-container *ngIf="!authService.isAuthenticated()">
        <a routerLink="/login" class="ev-btn ev-btn-ghost ev-mobile-auth-btn" (click)="closeMenu()">Connexion</a>
        <a routerLink="/register" class="ev-btn ev-btn-primary ev-mobile-auth-btn" (click)="closeMenu()">S'inscrire</a>
      </ng-container>
      <ng-container *ngIf="authService.isAuthenticated()">
        <button class="ev-btn ev-btn-outline ev-mobile-auth-btn" (click)="logout(); closeMenu()">
          Déconnexion
        </button>
      </ng-container>
    </div>
  </div>
</header>
